name: Hevy Daily Ingest

on:
  schedule:
    - cron: '0 17 * * *'  # 17h UTC = 18h/19h España
  workflow_dispatch:        # permite ejecutarlo manualmente también

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ingesta
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        run: python ingest.py

      - name: Commit y push data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/workouts.json
          git diff --staged --quiet || git commit -m "chore: daily hevy ingest $(date -u '+%Y-%m-%d')"
          git push
